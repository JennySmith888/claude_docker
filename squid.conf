# ── Allowed domains ──────────────────────────────────────────────────
acl allowed_sites dstdomain .anthropic.com
acl allowed_sites dstdomain .claude.com
acl allowed_sites dstdomain .cloudflare.com

# SLAC LLM APIs
acl allowed_sites dstdomain ai-api.slac.stanford.edu

# Git operations — remove if not needed
acl allowed_sites dstdomain .github.com
acl allowed_sites dstdomain .githubusercontent.com

# npm — remove if not needed
acl allowed_sites dstdomain registry.npmjs.org

# Anthropic telemetry — remove to block entirely
acl allowed_sites dstdomain .statsigapi.net

# ── SSL / CONNECT ────────────────────────────────────────────────────
acl SSL_ports port 443
acl CONNECT method CONNECT

# ── Access rules ─────────────────────────────────────────────────────
http_access allow CONNECT allowed_sites
http_access allow allowed_sites
http_access deny all

http_port 3128

# ── Logging ──────────────────────────────────────────────────────────
# Access log — every outbound request is recorded for auditing
access_log /var/log/squid/access.log squid

# ── Hardening ────────────────────────────────────────────────────────
# Don't reveal proxy version to the outside world
httpd_suppress_version_string on
via off
forwarded_for delete